# ===================================================================
# Orion Key CI/CD 工作流
# ===================================================================
#
# 流程：push 到 prod 分支 → 云端构建两个 Docker 镜像 → 推送 GHCR → 服务器拉取并重启
#
# 镜像构建方式：
#   后端 (Java):  Jib Maven 插件直接产出 Docker 镜像（无需 Dockerfile）
#   前端 (Next.js): 标准 Dockerfile 多阶段构建
#
# ===================================================================

name: Orion Key CI/CD

# ── 触发条件 ──
on:
  push:
    branches: [prod-getgpt]        # push 到 prod 分支时触发
    tags: ['v*']            # push tag（如 v1.0.0）时触发
  workflow_dispatch:         # 支持在 GitHub Actions 页面手动触发
    inputs:
      image_tag:
        description: '镜像标签（留空自动生成）'
        required: false
        type: string
      skip_build:
        description: '跳过构建，直接部署 GHCR 上已存在的镜像（必须同时填写 image_tag）'
        required: false
        type: boolean
        default: false

# 全局权限：最小权限原则
permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════
  # Job 1: 构建并推送镜像（在 GitHub 云端 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    # 手动触发且勾选 skip_build 时跳过构建（用于部署 GHCR 上已发布的版本，如回滚）
    # push 触发时 inputs.skip_build 为空，条件恒为 true，构建照常执行
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build) }}
    runs-on: ubuntu-latest      # 使用 GitHub 提供的云端 Ubuntu 机器
    permissions:
      contents: read
      packages: write           # 推送 GHCR 镜像需要 write 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven          # 缓存 Maven 依赖，加速后续构建

      # 计算镜像标签：手动输入 > git tag > commit SHA 前 7 位
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          # Docker 镜像名要求全小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"

      # ── 后端镜像：Jib 构建（无需 Docker daemon，无需 Dockerfile）──
      - name: Build & Push API image (Jib)
        working-directory: apps/api
        run: |
          mvn -B -DskipTests \
            -Djib.to.image="${{ steps.meta.outputs.api_image }}" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            compile jib:build

      # ── 前端镜像：Docker 多阶段构建 ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .                # 构建上下文 = 仓库根目录（Dockerfile.web 需要 monorepo 配置文件）
          file: ./Dockerfile.web    # 指定 Dockerfile 路径
          push: true
          tags: ${{ steps.meta.outputs.web_image }}

  # ════════════════════════════════════════════════════════════════
  # Job 2: 部署到服务器（在自建 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  deploy:
    needs: [build-and-push]             # 等 Job 1 完成后才执行
    # 默认规则下，needs 的 job 被跳过会连带跳过本 job，因此需要显式放行：
    # 构建成功（正常流水线）或 构建被跳过（skip_build 部署已有版本）都执行部署；
    # 构建失败/取消时不部署。!cancelled() 保证手动取消时整条流水线停止。
    if: ${{ !cancelled() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    runs-on: [self-hosted, prod-getgpt]        # 在带有 "demo-prod" 标签的自建 runner 上运行，用于区分多个workflow和runner
    permissions:
      contents: read
      packages: read                    # 拉取镜像只需 read 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 重新计算镜像标签（与 Job 1 逻辑一致）
      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          # 防呆：skip_build 模式下未指定 image_tag 时立即失败
          # （否则会回退到当前 commit 的 sha tag，而该 tag 因跳过构建在 GHCR 上不存在，pull 必然失败）
          if [[ "${{ inputs.skip_build }}" == "true" && -z "${{ inputs.image_tag }}" ]]; then
            echo "::error::skip_build=true 时必须填写 image_tag（GHCR 上已存在的镜像标签）"
            exit 1
          fi
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"

      # 注：镜像已设为 GHCR 公开（public），拉取无需登录认证。
      # 此处不做 docker login，避免在 runner 上残留过期的 GITHUB_TOKEN
      # 凭据（会导致两次部署之间人工手动 docker pull 时报 401）。
      # 若将来镜像改回私有，需在此恢复 Login to GHCR 步骤。

      # ── 核心部署步骤（Docker Compose）──
      #
      # 流程：
      #   1. 把仓库中的 docker-compose.yml 复制到服务器部署目录
      #   2. 将本次构建的镜像标签写入 .env（Compose 通过 ${API_IMAGE} 变量引用）
      #   3. docker compose pull 拉取最新镜像
      #   4. docker compose up -d 自动停旧容器、启新容器
      #
      # 相比 bare docker run，Compose 的好处：
      #   - 一个文件声明所有容器的配置（端口、网络、卷、环境变量）
      #   - 一条命令启动/停止/重建所有容器
      #   - 自动创建共享网络（容器间通过 service 名互访，无需手动 docker network create）
      #
      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_DIR="/opt/orion-key"

          # ① 将仓库根目录的 docker-compose.yml 复制到部署目录（每次部署自动同步最新配置）
          cp docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"

          # ② 更新 .env 中的镜像标签
          #    先移除旧的 IMAGE 行，再追加新值
          #    这样 docker-compose.yml 中的 ${API_IMAGE} 和 ${WEB_IMAGE} 就指向本次构建的镜像
          cd "$DEPLOY_DIR"
          sed -i '/^API_IMAGE=/d' .env 2>/dev/null || true
          sed -i '/^WEB_IMAGE=/d' .env 2>/dev/null || true
          echo "API_IMAGE=${{ steps.meta.outputs.api_image }}" >> .env
          echo "WEB_IMAGE=${{ steps.meta.outputs.web_image }}" >> .env

          # ③ 拉取最新镜像 + 启动/重建容器
          #    只 pull CI 构建的 api 和 web（来自 GHCR），不拉第三方镜像（如 bepusdt）
          #    避免 Docker Hub 不可达时阻塞部署；bepusdt 更新按部署指南 §10.4 手动操作
          #    up -d: 比较当前运行状态与 compose 配置，只重建有变化的容器
          #    --remove-orphans: 清理不再定义的旧容器
          docker compose pull api web
          docker compose up -d --remove-orphans

          # ④ 验证
          echo "Deployed with tag: ${{ steps.meta.outputs.tag }}"
          docker compose ps
