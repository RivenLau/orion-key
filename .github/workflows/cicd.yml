# ===================================================================
# Orion Key CI/CD 工作流
# ===================================================================
#
# 流程：
#   push tag v*           → 云端构建两个 Docker 镜像（:v* + :latest）→ 推送 GHCR（仅构建，不部署）
#   workflow_dispatch     → 云端构建（自定义 tag）→ 推送 GHCR；勾选 deploy 开关时才部署到 demo 服务器
#
# 镜像构建方式：
#   后端 (Java):  Jib Maven 插件直接产出 Docker 镜像（无需 Dockerfile）
#   前端 (Next.js): 标准 Dockerfile 多阶段构建
#
# ===================================================================

name: Orion Key CI/CD

# ── 触发条件 ──
on:
  push:
    tags: ['v*']            # 打 tag（如 v1.0.0）时触发，仅构建并推送镜像，不自动部署
  workflow_dispatch:         # 支持在 GitHub Actions 页面手动触发
    inputs:
      image_tag:
        description: '镜像标签（留空自动生成）'
        required: false
        type: string
      deploy:
        description: '是否部署到 demo 服务器（默认仅构建推送）'
        required: false
        type: boolean
        default: false

# 全局权限：最小权限原则
permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════
  # Job 1: 构建并推送镜像（在 GitHub 云端 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    runs-on: ubuntu-latest      # 使用 GitHub 提供的云端 Ubuntu 机器
    permissions:
      contents: read
      packages: write           # 推送 GHCR 镜像需要 write 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven          # 缓存 Maven 依赖，加速后续构建

      # 计算镜像标签：手动输入 > git tag > commit SHA 前 7 位
      # tag 触发时额外推 :latest，方便社区匿名拉取"当前稳定版"
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
            EXTRA=""
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            EXTRA="latest"          # git tag 触发：同时推 :latest
          else
            TAG="${GITHUB_SHA::7}"
            EXTRA=""
          fi
          # Docker 镜像名要求全小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "extra=$EXTRA"                                            >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"
          # 前端 build-push-action 支持多行 tags，用 heredoc 生成
          if [ -n "$EXTRA" ]; then
            {
              echo "web_tags<<EOF"
              echo "ghcr.io/$OWNER/orion-key-web:$TAG"
              echo "ghcr.io/$OWNER/orion-key-web:$EXTRA"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "web_tags=ghcr.io/$OWNER/orion-key-web:$TAG"           >> "$GITHUB_OUTPUT"
          fi

      # ── 后端镜像：Jib 构建（无需 Docker daemon，无需 Dockerfile）──
      # tag 触发时通过 -Djib.to.tags 额外推 :latest
      - name: Build & Push API image (Jib)
        working-directory: apps/api
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ steps.meta.outputs.extra }}" ]; then
            EXTRA_ARGS="-Djib.to.tags=${{ steps.meta.outputs.extra }}"
          fi
          mvn -B -DskipTests \
            -Djib.to.image="${{ steps.meta.outputs.api_image }}" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            $EXTRA_ARGS \
            compile jib:build

      # ── 前端镜像：Docker 多阶段构建 ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .                # 构建上下文 = 仓库根目录（Dockerfile.web 需要 monorepo 配置文件）
          file: ./Dockerfile.web    # 指定 Dockerfile 路径
          push: true
          tags: ${{ steps.meta.outputs.web_tags }}    # 支持多 tag（tag 触发时含 :latest）

  # ════════════════════════════════════════════════════════════════
  # Job 2: 部署到服务器（在自建 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  # 仅在 workflow_dispatch 且勾选 deploy 开关时执行；
  # push tag 仅构建推送镜像，不自动部署，避免误推到生产/演示环境。
  deploy:
    needs: [build-and-push]             # 等 Job 1 完成后才执行
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    runs-on: [self-hosted, demo]        # 在带有 "demo" 标签的 self-hosted runner 上运行（新 demo 服务器）
    permissions:
      contents: read
      packages: read                    # 拉取镜像只需 read 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 重新计算镜像标签（与 Job 1 逻辑一致）
      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── 核心部署步骤（Docker Compose）──
      #
      # 流程：
      #   1. 把仓库中的 docker-compose.yml 复制到服务器部署目录
      #   2. 将本次构建的镜像标签写入 .env（Compose 通过 ${API_IMAGE} 变量引用）
      #   3. docker compose pull 拉取最新镜像
      #   4. docker compose up -d 自动停旧容器、启新容器
      #
      # 相比 bare docker run，Compose 的好处：
      #   - 一个文件声明所有容器的配置（端口、网络、卷、环境变量）
      #   - 一条命令启动/停止/重建所有容器
      #   - 自动创建共享网络（容器间通过 service 名互访，无需手动 docker network create）
      #
      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_DIR="/opt/orion-key"

          # ① 将 docker-compose.yml 复制到部署目录（每次部署自动同步最新配置）
          cp docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"

          # ② 更新 .env 中的镜像标签
          #    先移除旧的 IMAGE 行，再追加新值
          #    这样 docker-compose.yml 中的 ${API_IMAGE} 和 ${WEB_IMAGE} 就指向本次构建的镜像
          cd "$DEPLOY_DIR"
          sed -i '/^API_IMAGE=/d' .env 2>/dev/null || true
          sed -i '/^WEB_IMAGE=/d' .env 2>/dev/null || true
          echo "API_IMAGE=${{ steps.meta.outputs.api_image }}" >> .env
          echo "WEB_IMAGE=${{ steps.meta.outputs.web_image }}" >> .env

          # ③ 拉取最新镜像 + 启动/重建容器
          #    只 pull CI 构建的 api 和 web（来自 GHCR），不拉第三方镜像（如 bepusdt）
          #    避免 Docker Hub 不可达时阻塞部署；bepusdt 更新按部署指南 §10.4 手动操作
          #    up -d: 比较当前运行状态与 compose 配置，只重建有变化的容器
          #    --remove-orphans: 清理不再定义的旧容器
          docker compose pull api web
          docker compose up -d --remove-orphans

          # ④ 验证
          echo "Deployed with tag: ${{ steps.meta.outputs.tag }}"
          docker compose ps
